name: 'CodeQL'
# Must be called codeql.yml NOT codeql.yaml or GitHub will ignore it

'on':
  workflow_dispatch:
  push:
    branches: ['main', 'master']
    paths:
      - '!.github/**'
      - '!.docs/**'
  schedule:
    - cron: '40 4 * * 0'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  scan:
    name: 'Audit Repository'
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-python-codeql.yaml@fd3c1b43bc919e9e70787b009ffa2768ddbb1267  # v0.7.2
    permissions:
      security-events: write  # Upload CodeQL results (SARIF) to code scanning
      packages: read  # Fetch internal or private CodeQL packs
      actions: read  # Required for workflows in private repositories
      contents: read
